name: TLC Model Check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        spec: [Tx, Executor]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tla-bin
        run: npm install -g tla-bin

      - name: Check ${{ matrix.spec }}.tla
        run: tlc ${{ matrix.spec }}.tla
